[project]
name = "vocal-core"
version = "0.3.7"
description = "Core model registry and adapters for Vocal - Ollama for Voice Models"
requires-python = ">=3.11"
license = { text = "SSPL-1.0" }
authors = [
    { name = "Vocal Contributors" }
]
keywords = ["speech-to-text", "tts", "stt", "whisper", "model-registry", "ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "faster-whisper>=1.2.1",
    "huggingface-hub>=1.7.1",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.13.1",
    "pyttsx3>=2.99",
    "numpy>=2.4.3",
    "transformers>=5.3.0",
    "torch>=2.8.0",
    "silero-vad>=6.2.1",
]

[project.urls]
Homepage = "https://github.com/niradler/vocal"
Documentation = "https://github.com/niradler/vocal/tree/master/docs"
Repository = "https://github.com/niradler/vocal"
Issues = "https://github.com/niradler/vocal/issues"

[project.optional-dependencies]
piper = [
    "piper-tts>=1.4.1",
    "scipy>=1.17.1",
]
kokoro = [
    "kokoro>=0.9.4",
    "torch>=2.8.0",
    "en-core-web-sm",
]
qwen3-tts = [
    "faster-qwen3-tts>=0.2.4",
    "torch>=2.8.0",
    "torchaudio>=2.8.0",
]
transformers = [
    "transformers>=5.3.0",
    "torch>=2.8.0",
]
nemo = [
    "nemo_toolkit[asr]>=2.7.0",
]
whisperx = [
    "whisperx>=3.8.2",
]
chatterbox = [
    "chatterbox-tts>=0.1.6",
]
voxtral = [
    "mistral-common>=1.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["vocal_core"]
