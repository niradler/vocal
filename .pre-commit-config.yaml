repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: unit-tests
        name: unit tests
        entry: uv run python -m pytest tests/unit/ -x -q --tb=short
        language: system
        pass_filenames: false
        stages: [pre-push]
